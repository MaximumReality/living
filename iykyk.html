<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLITCH TALES // BUREAU TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">

<style>
:root {
  --bureau-green: #39ff14;
  --bureau-dim: #004422;
  --terminal-bg: #050505;
}

body { background: #111; padding: 15px; }

#bureau-terminal {
  background: var(--terminal-bg);
  border: 1px solid var(--bureau-dim);
  padding: 40px;
  position: relative;
  overflow: hidden;
  max-width: 600px;
  margin: 20px auto;
  box-shadow: 0 0 25px rgba(57,255,20,0.1), inset 0 0 80px #000;
}

/* THE SCANLINES (Restored and Boosted) */
#bureau-terminal::after {
  content: " ";
  position: absolute;
  top: 0; left: 0; bottom: 0; right: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
  z-index: 10;
  background-size: 100% 3px, 3px 100%;
  pointer-events: none;
  opacity: 0.5;
}

/* CLASSIFIED Watermark */
#bureau-terminal::before {
  content: "CLASSIFIED";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-12deg);
  font-family: 'VT323', monospace;
  font-size: 5rem; /* Slightly larger */
   -webkit-text-stroke: 1px rgba(57, 255, 20, 0.15); 
  color: rgba(57, 255, 20, 0.08); /* Bumped from 0.03 to 0.08 */
  pointer-events: none;
  z-index: 1; /* Sits behind the text (z-index 2) but above the background */
  text-transform: uppercase;
    letter-spacing: 12px;
  white-space: nowrap;
}


.terminal-header {
  font-family: 'VT323', monospace;
  color: var(--bureau-green);
  font-size: 0.9rem;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--bureau-dim);
  display: flex;
  justify-content: space-between;
  position: relative;
  z-index: 2;
}

#terminal-output {
  font-family: 'Share Tech Mono', monospace;
  color: var(--bureau-green);
  font-size: 1.1rem;
  line-height: 1.6;
  min-height: 200px;
  margin-bottom: 30px;
  white-space: pre-wrap;
  position: relative;
  z-index: 5; /* Puts text ABOVE the stamp but BELOW the scanlines */
  text-shadow: 0 0 12px var(--bureau-green);
  animation: flicker 0.1s infinite;
}

@keyframes flicker {
  0% { opacity: 0.98; }
  50% { opacity: 1; }
  100% { opacity: 0.99; }
}

#terminal-output::after {
  content: "_";
  animation: blink 0.8s infinite;
}

@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

.btn-container { text-align: center; position: relative; z-index: 20; }

.terminal-btn {
  background: transparent;
  border: 1px solid var(--bureau-green);
  color: var(--bureau-green);
  padding: 12px 24px;
  font-family: 'VT323', monospace;
  font-size: 1.2rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: all 0.3s;
}

.terminal-btn:hover {
  background: var(--bureau-green);
  color: #000;
  box-shadow: 0 0 20px var(--bureau-green);
}
</style>
</head>
<body>

<div id="bureau-terminal">
  <div class="terminal-header">
    <span>SECURE FEED // ID: MAXIMUM_REALITY</span>
    <span>STATUS: ENCRYPTED</span>
  </div>

  <div id="terminal-output">[ SYSTEM ONLINE. AWAITING SIGNAL... ]</div>

  <div class="btn-container">
    <button class="terminal-btn" onclick="decryptNext()">Request Transmission</button>
  </div>
</div>

<script>
// Data and Functions keep the same logic but integrated correctly
const INGREDIENTS = {
  CHARACTER: { tags: ['tired wizard', 'sentient toaster', 'retired mime', 'anxious librarian', 'confused robot', 'ghost accountant', 'time-traveling barista', 'quantum cat', 'discount oracle', 'sad detective', 'immortal plumber', 'overqualified snail'] },
  SETTING: { tags: ['floating mall', 'abandoned moon café', 'inside a dream', 'the last bookstore', 'cursed elevator', 'underwater suburb', 'parallel post office', 'digital forest', 'neon monastery', 'forgotten theme park', 'fog-filled library', 'the edge of a map'] },
  MOOD: { tags: ['melancholy but funny', 'existential panic', 'quietly hopeful', 'suspicious calm', 'nostalgic for things that never happened', 'cozy but wrong', 'aggressively neutral', 'tender chaos'] },
  TWIST: { tags: ['time loop', 'identity swap', 'wrong universe', 'everyone already knew', 'it was a test', 'gravity optional', 'the narrator lied', 'it ends where it began', 'someone disappears slowly'] }
};

const templates = {
  short: ['{character} woke up in {setting} with no explanation. The {mood} feeling had been there for weeks. Eventually, {twist}.'],
  absurd: ['According to regulations, {character} was not allowed in {setting}. The rules said nothing about the {mood} atmosphere. {twist}. The ceiling applauded.'],
  emotional: ['Some places hold grief like water holds light. {character} knew this. {setting} knew this too. {mood}, and then {twist}.'],
  chaotic: ['REPORT: {character} entered {setting}. {mood} levels: CRITICAL. {twist}. Investigation ongoing.']
};

const PREFIXES = ["// LIVE TRANSMISSION //", "OFFICIAL RECORD (INTERNAL)", "ANOMALY REPORT: CLASS 3", "DECRYPTION COMPLETE", "LOG FILE: [REDACTED]"];
const STATUS_LINES = ["DECRYPTING SIGNAL...", "BYPASSING FIREWALL...", "ESTABLISHING HANDSHAKE...", "TRIANGULATING ORIGIN..."];

let state = { mode: 'short', chaos: false };
let typewriterTimer = null;

function getRandomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function buildStory() {
  const char = getRandomItem(INGREDIENTS.CHARACTER.tags);
  const setting = getRandomItem(INGREDIENTS.SETTING.tags);
  const mood = getRandomItem(INGREDIENTS.MOOD.tags);
  const twist = getRandomItem(INGREDIENTS.TWIST.tags);
  
  let template = getRandomItem(templates[state.mode] || templates.short);
  let story = template.replace(/{character}/g, char).replace(/{setting}/g, setting).replace(/{mood}/g, mood).replace(/{twist}/g, twist);

  if (state.chaos) {
    const glitch = ['̶', '̴', '̵'];
    story = story.split('').map(c => Math.random() < 0.05 ? c + getRandomItem(glitch) : c).join('');
  }
  return story;
}

function scrambleText(el, callback) {
  const chars = "!@#$%^&*()_+=-{}[]<>?/\\|";
  let i = 0;
  const interval = setInterval(() => {
    el.textContent = Array.from({length: 40}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
    i++;
    if (i > 10) {
      clearInterval(interval);
      callback();
    }
  }, 40);
}

function typewriteStory(text) {
  if (typewriterTimer) clearTimeout(typewriterTimer);
  const el = document.getElementById('terminal-output');
  el.textContent = '';
  let i = 0;
  function type() {
    if (i < text.length) {
      el.textContent += text[i];
      i++;
      typewriterTimer = setTimeout(type, 25);
    }
  }
  type();
}

function decryptNext() {
  const output = document.getElementById('terminal-output');
  output.textContent = `>>> ${getRandomItem(STATUS_LINES)}`;
  
  state.mode = getRandomItem(['short', 'absurd', 'emotional', 'chaotic']);
  state.chaos = Math.random() > 0.85;

  setTimeout(() => {
    scrambleText(output, () => {
      const prefix = getRandomItem(PREFIXES);
      const story = buildStory();
      typewriteStory(`${prefix}\n\n${story}`);
    });
  }, 800);
}
</script>
</body>
</html>
