<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXIMUM REALITY // PORTAL</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --terminal-green: #39ff14;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* The Main Cabinet Container */
        .arcade-cabinet {
            position: relative;
            width: 95vh; /* Scales based on screen height */
            max-width: 600px;
            aspect-ratio: 1 / 2.1; /* Maintains the tall arcade shape */
            background: url('1.jpg') no-repeat center center;
            background-size: contain;
            filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.2));
        }

        /* The Iframe Container (The Screen) */
        .screen-area {
            position: absolute;
            /* Coordinates specifically tuned for your 1.jpg geometry */
            top: 20.2%; 
            left: 19.5%;
            width: 55.5%;
            height: 20.5%;
            
            background: #000;
            overflow: hidden;
            border-radius: 5px;
            box-shadow: inset 0 0 15px rgba(0,0,0,1);
        }

        /* The Netlify App */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Makes the app look like a retro display */
            filter: brightness(1.1) contrast(1.1) saturate(1.2);
            opacity: 0.95;
        }

        /* Retro CRT Overlay Effect */
        .screen-area::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; /* Allows clicking through to the app */
            z-index: 10;
        }

        /* Subtle Screen Flicker */
        @keyframes flicker {
            0% { opacity: 0.98; }
            5% { opacity: 0.95; }
            10% { opacity: 0.99; }
            100% { opacity: 1; }
        }

        .screen-area {
            animation: flicker 0.1s infinite;
        }

        /* Status Footer */
        .status-bar {
            position: absolute;
            bottom: -30px;
            width: 100%;
            text-align: center;
            color: var(--neon-blue);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="arcade-cabinet">
        <div class="screen-area">
            <iframe 
                src="https://maximumreality.netlify.app/" 
                loading="lazy">
            </iframe>
        </div>
        <div class="status-bar">
            Uplink Status: Nominal // Reality Alignment: 100%
        </div>
    </div>

</body>
</html>
