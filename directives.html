<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRM | DIRECTIVES</title>
    <style>
    :root {
        --bureau-green: #00ff41;
        --bureau-red: #ff0055;
        --bureau-bg: #050505;
        --terminal-font: 'Courier New', Courier, monospace;
    }

    /* Prevent scrolling and zooming */
    html, body {
        position: fixed;
        overflow: hidden;
        width: 100%;
        height: 100dvh; /* Dynamic height accounts for iOS address bar */
        margin: 0;
        padding: 0;
        background-color: var(--bureau-bg);
        touch-action: none; /* Disables pinch-zoom and pan */
    }

    #terminal {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 15px;
        box-sizing: border-box;
    }

    .header {
        flex: 0 0 auto;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
        font-size: 0.7rem;
        display: flex;
        justify-content: space-between;
    }

    /* The "Work Area" - keeps the code and input together */
    .active-zone {
        flex: 0 0 auto;
        margin-top: 10px;
        background: rgba(0, 255, 65, 0.05);
        padding: 10px;
        border: 1px solid #222;
    }

    #encoded-text {
        font-size: 1.1rem;
        letter-spacing: 2px;
        word-break: break-all;
        margin: 5px 0;
        color: white;
    }

    .input-line {
        display: flex;
        align-items: center;
        border-top: 1px solid #333;
        padding-top: 10px;
    }

    input {
        background: transparent;
        border: none;
        color: var(--bureau-green);
        font-family: var(--terminal-font);
        font-size: 16px; /* 16px is the magic number to stop iOS auto-zoom */
        width: 100%;
        outline: none;
        text-transform: uppercase;
    }

    /* History fills the remaining space and scrolls internally */
    #history {
        flex: 1 1 auto;
        overflow-y: auto;
        margin-top: 10px;
        font-size: 0.8rem;
        border-top: 1px solid #111;
        padding-top: 10px;
        /* Custom scrollbar for cyberpunk look */
        scrollbar-width: thin;
        scrollbar-color: #333 transparent;
    }

    .log { opacity: 0.6; margin-bottom: 4px; }
    .error { color: var(--bureau-red); }
    .success { color: var(--bureau-green); border-left: 2px solid var(--bureau-green); padding-left: 5px; }

</style>

<body>
<div id="terminal">
    <div class="header">
        <span>BRM // DIRECTIVES</span>
        <span id="timer">STABILITY: 30s</span>
    </div>

    <div class="active-zone">
        <div class="log" style="font-size:0.6rem">DECRYPT_TARGET:</div>
        <div id="encoded-text">INITIALIZING...</div>
        
        <div class="input-line">
            <span style="margin-right:8px">></span>
            <input type="text" id="user-input" 
                   inputmode="text" 
                   autocapitalize="none" 
                   autocomplete="off" 
                   spellcheck="false"
                   placeholder="DECRYPT HERE...">
        </div>
    </div>

    <div id="history">
        <div class="log">> SYSTEM READY. STANDBY FOR VANE...</div>
    </div>
</div>


    <div id="history"></div>

    <div class="input-area">
        <span class="prompt">BRM@LIVING_REPO:~$</span>
        <input type="text" id="user-input" 
               inputmode="text" 
               autocapitalize="none" 
               autocomplete="off" 
               autofocus>
    </div>
</div>

<script>
    const database = [
        { id: "LOG_001", encrypted: "GZPV_NVHG_XLEV_GSV_EZE", shift: 0, solution: "THEY MUST CODE THE EYE", type: "atbash" },
        { id: "LOG_002", encrypted: "IBU_IB_SFBMJUZ", shift: 1, solution: "HACK HA REALITY", type: "caesar" },
        { id: "LOG_003", encrypted: "VANE IS THE REPO", shift: 0, solution: "VANE IS THE REPO", type: "plain" }
    ];

    let currentIdx = 0;
    let timeLeft = 30;
    let timerInterval;

    const display = document.getElementById('encoded-text');
    const input = document.getElementById('user-input');
    const history = document.getElementById('history');
    const timerDisplay = document.getElementById('timer');

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 30;
        timerInterval = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = `STABILITY: ${timeLeft}s`;
            if (timeLeft <= 0) {
                failDirective();
            }
        }, 1000);
    }

    function loadDirective() {
        const data = database[currentIdx];
        display.innerText = data.encrypted;
        addLog(`FILE_LOADED: ${data.id}`, "log");
        startTimer();
    }

    function addLog(msg, className) {
        const div = document.createElement('div');
        div.className = className;
        div.innerText = `> ${msg}`;
        history.prepend(div);
    }

    function failDirective() {
        addLog("TIME EXPIRED. SYSTEM RESET.", "error");
        input.value = "";
        loadDirective(); // Resets the current puzzle
    }

    input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const guess = input.value.toUpperCase().trim();
            const solution = database[currentIdx].solution;

            if (guess === solution) {
                addLog("DECRYPTION SUCCESSFUL. COMMITTING...", "success");
                currentIdx++;
                input.value = "";
                
                if (currentIdx < database.length) {
                    setTimeout(loadDirective, 1000);
                } else {
                    clearInterval(timerInterval);
                    display.innerText = "REPO SYNCED. ALL REALITIES STABLE.";
                    addLog("DIRECTIVE STREAM COMPLETE.", "success");
                }
            } else {
                addLog("INVALID INPUT. TRY AGAIN.", "error");
                input.value = "";
            }
        }
    });

    // Initialize the first load
    window.onload = loadDirective;

</script>
</body>
</html>
