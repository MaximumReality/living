<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BUREAU OF REALITY // SIGNAL DECRYPTOR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Orbitron:wght@400;700;900&display=swap');
:root{--green:#00ff88;--green-dim:#00ff8855;--green-faint:#00ff8818;--red:#ff2244;--cyan:#00ffff;--orange:#ff8800;--purple:#cc00ff;--bg:#000a04;--vf-r:140px;--vf-cy:50%}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--green);user-select:none}

/* BOOT UI */
#boot{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:36px}
.boot-logo { font-family: 'VT323', monospace; color: var(--green); text-align: center; line-height: 1; text-shadow: 0 0 15px var(--green); width: 100%; margin-bottom: 20px; }
.title-row { display: block; white-space: nowrap; font-size: 8.5vw; letter-spacing: 1px; margin: 5px 0; }
.boot-sub{font-size:10px;color:#006633;letter-spacing:3px;text-align:center}
.boot-divider{width:80%;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.boot-warnings{font-size:10px;color:#004422;text-align:left;width:100%;line-height:1.9}
.boot-warnings span{color:var(--green)}
#boot-btn{margin-top:8px;padding:16px 28px;background:transparent;border:1px solid var(--green);color:var(--green);font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:4px;cursor:pointer;box-shadow:0 0 20px var(--green-dim),inset 0 0 20px var(--green-faint)}

/* APP CORE */
#app { background: #000; display: none; position: fixed; inset: 0; flex-direction: column; }

/* BAKED-IN FILTERS (Stays like this!) */
#video-bg {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
  background: #000;
  filter: saturate(1.2) brightness(1.6) contrast(0.9);
  transition: filter 0.5s ease;
}

.mode-stealth { filter: saturate(0) brightness(1.8) contrast(1.2) sepia(1) hue-rotate(140deg) !important; }

#glitch-overlay { position: fixed; inset: 0; z-index: 1; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px); mix-blend-mode: multiply; pointer-events: none; }
#color-overlay { position: fixed; inset: 0; z-index: 2; background: rgba(0, 255, 136, 0.05); mix-blend-mode: screen; pointer-events: none; }
#terminal-canvas{position:fixed;inset:0;z-index:3;pointer-events:none}
#vf-mask{position:fixed;inset:0;background:radial-gradient(circle var(--vf-r) at 50% var(--vf-cy),transparent 0%,transparent calc(var(--vf-r) - 2px),rgba(0,255,136,0.5) calc(var(--vf-r) - 2px),rgba(0,255,136,0.5) calc(var(--vf-r) + 1px),rgba(0,12,5,0.92) calc(var(--vf-r) + 1px));z-index:4;pointer-events:none}
.vf-ring{position:fixed;border-radius:50%;z-index:5;pointer-events:none;transform:translate(-50%,-50%);left:50%}
#vf-ring-outer{border:1px solid rgba(0,255,136,0.3);animation:ringPulse 4s ease-in-out infinite}
#vf-ring-inner{border:1px solid rgba(0,255,136,0.15);animation:ringPulse 4s ease-in-out infinite reverse}
#vf-crosshair{position:fixed;z-index:5;pointer-events:none;transform:translate(-50%,-50%);left:50%}
#vf-crosshair::before,#vf-crosshair::after{content:'';position:absolute;background:rgba(0,255,136,0.5)}
#vf-crosshair::before{width:1px;height:20px;left:50%;top:50%;transform:translate(-50%,-50%)}
#vf-crosshair::after{width:20px;height:1px;left:50%;top:50%;transform:translate(-50%,-50%)}
@keyframes ringPulse{0%,100%{opacity:0.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.9;transform:translate(-50%,-50%) scale(1.03)}}
.corner{position:fixed;z-index:5;width:20px;height:20px;pointer-events:none}
.corner::before,.corner::after{content:'';position:absolute;background:var(--green);opacity:0.6}
.corner::before{width:100%;height:1px;top:0;left:0}
.corner::after{width:1px;height:100%;top:0;left:0}
#c-tl{top:16px;left:16px}#c-tr{top:16px;right:16px;transform:scaleX(-1)}
#c-bl{bottom:16px;left:16px;transform:scaleY(-1)}#c-br{bottom:16px;right:16px;transform:scale(-1)}
#hud-top{position:fixed;top:0;left:0;right:0;z-index:6;padding:20px 20px 12px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
.hud-block{display:flex;flex-direction:column;gap:4px}
.hud-label{font-size:8px;color:#006633;letter-spacing:3px}
.hud-value{font-family:'VT323',monospace;font-size:22px;color:var(--green);text-shadow:0 0 10px var(--green-dim);line-height:1}
#hud-bottom{position:fixed;bottom:0;left:0;right:0;z-index:6;padding:12px 20px 36px;pointer-events:none}
#scan-log{height:56px;overflow:hidden;display:flex;flex-direction:column-reverse;gap:2px}
.log-entry{font-size:9px;letter-spacing:1px;line-height:1.4;opacity:0;transform:translateY(4px);animation:logIn 0.3s forwards}
@keyframes logIn{to{opacity:1;transform:translateY(0)}}
#lock-panel{position:fixed;left:50%;transform:translateX(-50%);z-index:8;width:calc(100% - 40px);max-width:380px;background:rgba(0,8,3,0.95);border:1px solid var(--green);padding:20px;display:none;box-shadow:0 0 40px var(--green-dim)}
#lock-panel.active{display:block}
</style>
</head>
<body onclick="onTap(event)">
<div id="boot">
  <div class="boot-logo">
    <span style="font-size: 6vw;">BUREAU OF REALITY</span>
    <div class="title-row">░░ SIGNAL DECRYPTOR ░░</div>
    <span style="font-size: 3vw; color: #006633; letter-spacing: 2px;">FIELD UNIT v3.7 // CLASSIFIED</span>
  </div>
  <div class="boot-divider"></div>
  <div class="boot-warnings">
    <span>SYS:</span> Calibrating light sensors...<br>
    <span>WARN:</span> Simulation anomalies detected<br>
    <span>AUTH:</span> Clearance Level 4 required
  </div>
  <div class="boot-divider"></div>
  <button id="boot-btn" onclick="initLens()">⬡ INITIALIZE BUREAU LENS ⬡</button>
  <div class="boot-sub">MAXIMUM REALITY // FIELD DIVISION</div>
</div>

<div id="app">
  <video id="video-bg" autoplay playsinline muted></video>
  <canvas id="video-canvas" style="display:none"></canvas>
  <div id="glitch-overlay"></div>
  <div id="color-overlay"></div>
  <canvas id="terminal-canvas"></canvas>
  <div id="vf-mask"></div>
  <div class="vf-ring" id="vf-ring-outer"></div>
  <div class="vf-ring" id="vf-ring-inner"></div>
  <div id="vf-crosshair"></div>
  <div class="corner" id="c-tl"></div><div class="corner" id="c-tr"></div><div class="corner" id="c-bl"></div><div class="corner" id="c-br"></div>
  
  <div id="hud-top">
    <div class="hud-block"><div class="hud-label">HEADING</div><div class="hud-value" id="hud-heading">---°</div></div>
    <div class="hud-block" style="align-items:center"><div class="hud-label">ANOMALY LVL</div><div class="hud-value" id="hud-level">01</div></div>
    <div class="hud-block" style="text-align:right"><div class="hud-label">SIGNAL</div><div class="hud-value" id="hud-signal">0%</div></div>
  </div>

  <div id="lock-panel">
    <div id="lock-header" style="color:var(--green); font-size:10px; margin-bottom:10px;">▶ SIGNAL LOCKED</div>
    <div id="lock-msg" style="color:var(--green); font-family:'VT323'; font-size:18px;"></div>
    <div onclick="dismissLock()" style="margin-top:15px; text-align:center; color:#006633; font-size:9px; cursor:pointer;">[ TAP TO DISMISS ]</div>
  </div>

  <div id="hud-bottom">
    <button onclick="toggleVision()" style="pointer-events:all; background:transparent; border:1px solid var(--green); color:var(--green); font-size:9px; padding:6px 12px; margin-bottom:10px; font-family:'Orbitron';">MODE: OPTICAL</button>
    <div id="scan-log"></div>
  </div>
</div>

<script>
const state={heading:0,anomalyLevel:1,locked:false,scanCount:0,vfCx:0,vfCy:0,vfR:140};

async function initLens(){
  const btn = document.getElementById('boot-btn');
  const video = document.getElementById('video-bg');
  btn.textContent = 'CONNECTING...';
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      // The CSS filter is already applied, so it stays bright!
    };

    await requestOrientation();

    setTimeout(() => {
      document.getElementById('boot').style.display='none';
      document.getElementById('app').style.display='flex';
      setupViewfinder();
      startTerminalRain();
      startStatusTick();
      addLog('BUREAU LENS ACTIVE', 'var(--green)');
    }, 500);

  } catch(e) {
    btn.textContent = 'RETRY CONNECTION';
    console.error(e);
  }
}

async function requestOrientation(){
  if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
    try { await DeviceOrientationEvent.requestPermission(); } catch(e){}
  }
  window.addEventListener('deviceorientation', (e) => {
    state.heading = e.webkitCompassHeading || (360 - e.alpha);
    document.getElementById('hud-heading').textContent = Math.round(state.heading) + '°';
  }, true);
}

function setupViewfinder(){
  const W=window.innerWidth, H=window.innerHeight;
  const r=Math.min(W,H)*0.36, cy=H*0.44;
  document.documentElement.style.setProperty('--vf-r',r+'px');
  document.documentElement.style.setProperty('--vf-cy',cy+'px');
  state.vfCx=W/2; state.vfCy=cy; state.vfR=r;
  
  const outer = document.getElementById('vf-ring-outer');
  outer.style.width = outer.style.height = (r*2+24)+'px';
  outer.style.top = cy+'px';
  const inner = document.getElementById('vf-ring-inner');
  inner.style.width = inner.style.height = (r*2-24)+'px';
  inner.style.top = cy+'px';
  document.getElementById('vf-crosshair').style.top = cy+'px';
}

function startTerminalRain(){
  const canvas=document.getElementById('terminal-canvas');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const cols=Math.floor(canvas.width/14);
  const drops=Array(cols).fill(0);
  setInterval(()=>{
    ctx.fillStyle='rgba(0,10,4,0.15)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#0f8'; ctx.font='12px monospace';
    drops.forEach((y,i)=>{
      const text = String.fromCharCode(0x30A0 + Math.random() * 96);
      ctx.fillText(text, i*14, y);
      if(y > canvas.height && Math.random() > 0.975) drops[i]=0;
      else drops[i]+=14;
    });
  },50);
}

function onTap(e){
  if(state.locked) return;
  state.scanCount++;
  addLog('SCANNING SECTOR ' + state.scanCount, 'var(--cyan)');
  showLockPanel("ANOMALY DETECTED. Signal is matching Maximum Reality frequencies. Proceed with caution.", "BUREAU SCAN");
}

function showLockPanel(msg, header){
  state.locked = true;
  const panel = document.getElementById('lock-panel');
  document.getElementById('lock-msg').textContent = msg;
  panel.classList.add('active');
}

function dismissLock(){
  state.locked = false;
  document.getElementById('lock-panel').classList.remove('active');
}

function addLog(text, color){
  const log=document.getElementById('scan-log');
  const el=document.createElement('div');
  el.className='log-entry'; el.style.color=color;
  el.textContent='> ' + text;
  log.prepend(el);
}

function startStatusTick(){
  setInterval(()=>{
    const sig = Math.floor(Math.random()*40) + 60;
    document.getElementById('hud-signal').textContent = sig + '%';
  }, 2000);
}

let isStealth = false;
function toggleVision(){
  isStealth = !isStealth;
  const video = document.getElementById('video-bg');
  video.classList.toggle('mode-stealth', isStealth);
  addLog(isStealth ? 'NVG ENGAGED' : 'OPTICAL RESTORED', isStealth ? 'var(--cyan)' : 'var(--green)');
}
</script>
</body>
</html>
